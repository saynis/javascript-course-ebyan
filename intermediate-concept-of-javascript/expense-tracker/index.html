<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="app-header">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Track where your money goes</p>
  </header>

  <main class="container">

    <!-- ─── Totals display ─── -->
    <section class="totals">
      <div class="total-box">
        <p class="total-label">Total Spent</p>
        <p class="total-value" id="totalAmount">$0.00</p>
      </div>
      <div class="total-box">
        <p class="total-label">Number of Expenses</p>
        <p class="total-value" id="totalCount">0</p>
      </div>
    </section>

    <!-- ─── Form to add an expense ─── -->
    <section class="form-section">
      <h2 class="section-title">Add New Expense</h2>

      <form id="expenseForm" novalidate>

        <!-- Description field -->
        <div class="form-field">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            placeholder="e.g. Coffee with friends"
            maxlength="50"
          >
          <span class="error-message" id="description-error"></span>
        </div>

        <!-- Amount field -->
        <div class="form-field">
          <label for="amount">Amount ($)</label>
          <input
            type="number"
            id="amount"
            placeholder="0.00"
            step="0.01"
            min="0"
          >
          <span class="error-message" id="amount-error"></span>
        </div>

        <!-- Category dropdown -->
        <div class="form-field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Submit button -->
        <button type="submit" class="submit-btn">+ Add Expense</button>
      </form>
    </section>


    <!-- ─── Expense list ─── -->
    <section class="list-section">
      <h2 class="section-title">Your Expenses</h2>
      <ul id="expenseList" class="expense-list">
        <!-- Expenses are added here by JavaScript -->
      </ul>
    </section>

  </main>

  <!-- Load the JavaScript at the bottom so HTML loads first -->
  <script src="script.js"></script>
</body>
</html>
